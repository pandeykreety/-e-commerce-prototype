{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <center>
            <div style="width:40px; height:40px; background:rgba(16,185,129,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2>Set New Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: -1rem; margin-bottom: 2rem;">Create a strong, unique password for your account.</p>
        </center>
        
        <form method="POST" action="">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter new strong password" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <!-- DYNAMIC FEEDBACK: Shared with registration logic via main.js -->
                <div class="pw-strength-container" id="pw-container">
                    <div class="pw-bar"><div class="pw-fill"></div></div>
                    <div style="margin-top: 0.5rem; display: flex; justify-content: space-between; align-items: center;">
                        <span id="pw-text" style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">Strength: None</span>
                    </div>
                    <ul class="pw-checklist" style="list-style:none; padding:0; margin-top:0.75rem; font-size:0.75rem; color:var(--text-muted); display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                        <li id="req-length" class="req-item"><span class="req-icon">○</span> At least 8 characters</li>
                        <li id="req-upper" class="req-item"><span class="req-icon">○</span> 1 Uppercase</li>
                        <li id="req-lower" class="req-item"><span class="req-icon">○</span> 1 Lowercase</li>
                        <li id="req-num" class="req-item"><span class="req-icon">○</span> 1 Number</li>
                        <li id="req-special" class="req-item"><span class="req-icon">○</span> 1 Special Char</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
            </div>

            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
