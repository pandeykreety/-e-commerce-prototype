{% extends 'base.html' %}
{% block content %}
<!-- AUTHENTICATION ENTRY: Standard credential provision step before issuing MFA checks -->
<div class="auth-container">
    <div class="card">
        <center>
            <div style="width:48px; height:48px; background:rgba(15,23,42,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2>Secure Login</h2>
        </center>
        <!-- LOGIN PAYLOAD: Action route deliberately left blank to POST to current URI -->
        <form method="POST" action="">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <!-- PASS VISIBILITY: Prevents passive observation attacks by masking by default -->
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your secret password" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <!-- PASSWORD RECOVERY: Link to the out-of-band reset flow -->
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="{{ url_for('forgot_password') }}" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn">Login Securely</button>
            <p style="margin-top:1.5rem; text-align:center; font-size:0.875rem; color:var(--text-muted);">New back here? <a href="{{ url_for('register') }}" style="color:var(--primary); font-weight:600;">Register Account</a></p>
        </form>
    </div>
</div>
{% endblock %}
