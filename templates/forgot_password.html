{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <center>
            <div style="width:48px; height:48px; background:rgba(15,23,42,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l-2.5-2.5"></path></svg>
            </div>
            <h2>Reset Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: -1rem; margin-bottom: 2rem;">Enter your username or email to receive a recovery code.</p>
        </center>
        
        <form method="POST" action="">
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input type="text" id="identifier" name="identifier" placeholder="Enter your username or email" required autocomplete="off">
            </div>
            <button type="submit" class="btn">Send Recovery Code</button>
            <p style="margin-top:1.5rem; text-align:center; font-size:0.875rem; color:var(--text-muted);">Remembered it? <a href="{{ url_for('login') }}" style="color:var(--primary); font-weight:600;">Back to Login</a></p>
        </form>
    </div>
</div>
{% endblock %}
