{% extends 'base.html' %}
{% block content %}
<!-- MFA CHALLENGE: Secondary verification layer preventing immediate session token issuing -->
<div class="auth-container">
    <div class="card">
        <center>
            <div style="width:48px; height:48px; background:rgba(15,23,42,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2>Device Verification</h2>
            <p style="margin-bottom:2rem; font-size:0.875rem; color:var(--text-muted);">Confirm identity using OTP sent to: <strong>{{ email }}</strong></p>
        </center>
        
        <!-- SECOND FACTOR FORM: Expects a specific 6-digit Time-Based OTP -->
        <form method="POST" action="">
            <div class="form-group">
                <label for="otp" style="text-align:center;">Enter 6-Digit Secure OTP</label>
                <input type="text" id="otp" name="otp" required autocomplete="off" placeholder="######" style="text-align:center; font-size:2rem; letter-spacing:0.5rem; font-weight:800; border:2px solid var(--border); padding:1rem;">
                <p style="display:block; text-align:center; margin-top:1.5rem; color:var(--text-muted); font-size:0.75rem;">Your code should arrive within seconds. Please check your inbox.</p>
            </div>
            <!-- ACTION SUBMIT: Validates the token against the expiring session store -->
            <button type="submit" class="btn btn-success">Verify Identity</button>
            <p style="margin-top:1.5rem; text-align:center; font-size:0.875rem; color:var(--text-muted);"><a href="{{ url_for('logout') }}" style="color:var(--danger); font-weight:600;">Cancel Verification</a></p>
        </form>
    </div>
</div>
{% endblock %}
