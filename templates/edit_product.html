{% extends "base.html" %}
{% block content %}
<div class="auth-container" style="max-width: 600px; margin-top: 2rem;">
    <div class="card">
        <h2>Edit Product</h2>
        <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" value="{{ product.name }}" required>
            </div>
            
            <div class="form-group">
                <label for="price">Retail Price (Rs.)</label>
                <input type="number" step="0.01" id="price" name="price" value="{{ product.price }}" required>
            </div>

            <div style="display:flex; gap:1rem; margin-top:2rem;">
                <button type="submit" class="btn btn-success" style="flex:1;">Save Changes</button>
                <a href="{{ url_for('dashboard_seller') }}" class="btn" style="flex:1; background:#e2e8f0; color:#0f172a; text-align:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
