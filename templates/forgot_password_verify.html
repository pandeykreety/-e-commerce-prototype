{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <center>
            <div style="width:40px; height:40px; background:rgba(37,99,235,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            </div>
            <h2>Verify Identity</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: -1rem; margin-bottom: 2rem;">We've sent a 6-digit verification code to your email.</p>
        </center>
        
        <form method="POST" action="">
            <div class="form-group">
                <label for="otp">Enter 6-Digit Code</label>
                <input type="text" id="otp" name="otp" placeholder="_ _ _ _ _ _" maxlength="6" required style="letter-spacing: 0.5rem; text-align: center; font-size: 1.5rem; font-weight: 700;" autocomplete="off">
            </div>
            <button type="submit" class="btn">Verify & Continue</button>
            <p style="margin-top:1.5rem; text-align:center; font-size:0.875rem; color:var(--text-muted);">Didn't receive it? <a href="{{ url_for('forgot_password') }}" style="color:var(--primary); font-weight:600;">Resend Code</a></p>
        </form>
    </div>
</div>
{% endblock %}
